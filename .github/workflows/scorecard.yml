name: Scorecard

# OpenSSF Scorecard grades the repo's supply-chain posture — token permissions,
# pinned actions, branch protection, dependency-update tooling — and uploads the
# findings to the Security tab (code scanning). Runs weekly and on pushes to
# main; the results also feed the public Scorecard badge if enabled.
on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "41 5 * * 1"

# Least privilege at the top; the analyze job elevates only what it needs.
permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to the code-scanning dashboard.
      security-events: write
      # Needed for the OIDC token used to read branch-protection settings.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishing lets the results power a public score badge. Safe for a
          # public repo; no secrets are exposed.
          publish_results: true

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
