[tools]
bun = "1.3.14"

[tasks.dev]
description = "Serve public/ on http://127.0.0.1:4173 with hot reload"
run = "bun run --hot src/index.ts"

[tasks.start]
description = "Serve public/ in production mode"
run = "bun run src/index.ts"

[tasks.typecheck]
description = "Type-check the server with tsc (no emit)"
run = "bun run typecheck"

[tasks.format]
description = "Format and auto-fix src/ with Biome"
run = "bun run format"

[tasks.lint]
description = "Lint + format check src/ with Biome (read-only)"
run = "bun run lint"
