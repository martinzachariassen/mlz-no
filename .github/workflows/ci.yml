name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only token is all this workflow needs.
permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the Bun version pinned in mise.toml — single source of truth,
      # no separate bun-version to keep in sync.
      - name: Set up mise (installs Bun from mise.toml)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & format check
        run: mise run lint

      - name: Type-check
        run: mise run typecheck

      - name: Build
        run: mise run build

      # Boot the real server and assert the hardening still holds. HOST is pinned
      # to IPv4 so the check is independent of the runner's dual-stack settings
      # (the app defaults to :: for Railway).
      - name: Smoke-test the server
        env:
          HOST: "127.0.0.1"
          PORT: "4173"
        run: |
          set -euo pipefail
          bun run start &
          server=$!
          trap 'kill "$server" 2>/dev/null || true' EXIT

          # Wait (up to ~10s) for the server to accept connections.
          for _ in $(seq 1 40); do
            curl -sf -o /dev/null "http://127.0.0.1:$PORT/" && break
            sleep 0.25
          done

          fail=0
          check() { # label expected actual
            if [ "$2" = "$3" ]; then
              echo "ok   $1 ($3)"
            else
              echo "FAIL $1: expected $2, got $3"
              fail=1
            fi
          }

          base="http://127.0.0.1:$PORT"
          check "GET / -> 200"          200 "$(curl -s -o /dev/null -w '%{http_code}' "$base/")"
          check "GET /robots -> 200"    200 "$(curl -s -o /dev/null -w '%{http_code}' "$base/robots.txt")"
          check "POST / -> 405"         405 "$(curl -s -o /dev/null -w '%{http_code}' -X POST "$base/")"
          check "missing -> 404"        404 "$(curl -s -o /dev/null -w '%{http_code}' "$base/nope")"
          check "traversal -> 404"      404 "$(curl -s -o /dev/null -w '%{http_code}' "$base/%2e%2e/package.json")"

          # The security-header middleware must be in the chain.
          for header in content-security-policy strict-transport-security x-content-type-options; do
            if curl -s -D - -o /dev/null "$base/" | grep -qi "^$header:"; then
              echo "ok   header $header present"
            else
              echo "FAIL header $header missing"
              fail=1
            fi
          done

          exit "$fail"
