# Cache-Control by URI. HTML, manifest, sitemap and robots have no asset
# hashing, so don't let intermediaries pin a stale copy after a deploy.
# Everything else (css/js/svg/png/etc.) is fingerprint-free too but rarely
# changes, so a 30-day max-age is fine.
map $uri $cache_control {
    default                  "public, max-age=2592000";
    ~^/$                     "no-cache";
    ~^/index\.html$          "no-cache";
    ~^/404\.html$            "no-cache";
    ~^/site\.webmanifest$    "no-cache";
    ~^/sitemap\.xml$         "no-cache";
    ~^/robots\.txt$          "no-cache";
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript image/svg+xml application/manifest+json application/xml text/plain;

    # Railway terminates TLS upstream, so set HSTS here too; harmless if the
    # edge also sets it. No `preload` until intentionally submitting to the
    # HSTS preload list (it's effectively irreversible).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                                  always;
    add_header X-Frame-Options           "DENY"                                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # script-src keeps 'unsafe-inline' for the JSON-LD Person schema in
    # index.html and the Umami analytics script. style-src is tight ('self' +
    # Google Fonts CSS) since all page CSS lives in styles.css.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://cloud.umami.is; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://cloud.umami.is; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Cache-Control             $cache_control                             always;

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
