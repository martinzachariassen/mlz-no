name: Lighthouse

# Audits the homepage the way a browser sees it — accessibility, best-practices,
# SEO, and performance — against the real server. LHCI boots `bun run start`,
# waits for the "listening" log line, then runs Lighthouse three times and
# asserts the category scores in .github/lighthouse/lighthouserc.json.
#
# Accessibility and SEO are hard gates. Best-practices and performance are
# warnings: Lighthouse's "Use HTTPS" audit always fails against the plain-HTTP
# test server, and perf swings with third-party font/analytics fetches — neither
# reflects production (HTTPS, behind Railway/Cloudflare).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: audit homepage
    runs-on: ubuntu-latest
    env:
      HOST: "127.0.0.1"
      PORT: "4173"
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise (installs Bun from mise.toml)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ".github/lighthouse/lighthouserc.json"
