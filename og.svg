<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#303446"/>

  <!-- Subtle top-right glow accent -->
  <radialGradient id="glow" cx="80%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#ca9ee6" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#ca9ee6" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- MZ monogram, large and faint in the background -->
  <text
    x="980" y="420"
    font-family="Inter, system-ui, sans-serif"
    font-size="320"
    font-weight="700"
    fill="#ca9ee6"
    opacity="0.06"
    text-anchor="middle"
    letter-spacing="-10"
  >MZ</text>

  <!-- Name -->
  <text
    x="96" y="290"
    font-family="Inter, system-ui, sans-serif"
    font-size="88"
    font-weight="700"
    fill="#c6d0f5"
    letter-spacing="-2"
  >Martin Zachariassen</text>

  <!-- Mauve accent line under name -->
  <rect x="96" y="318" width="120" height="5" rx="3" fill="#ca9ee6"/>

  <!-- Tagline -->
  <text
    x="96" y="390"
    font-family="Inter, system-ui, sans-serif"
    font-size="32"
    font-weight="500"
    fill="#a5adce"
    letter-spacing="3"
  >DEVELOPER &amp; ARCHITECT</text>

  <!-- Domain bottom-right -->
  <text
    x="1104" y="580"
    font-family="Inter, system-ui, sans-serif"
    font-size="26"
    font-weight="500"
    fill="#626880"
    text-anchor="end"
  >mlz.no</text>
</svg>
